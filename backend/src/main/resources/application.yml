server:
  port: 8080

spring:
  application:
    name: telegram-media-downloader

  # MySQL 数据源
  datasource:
    url: jdbc:mysql://${DB_HOST:172.17.0.3}:${DB_PORT:1506}/${DB_NAME:tg_downloader}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

# MyBatis 配置（不在 spring: 命名空间下）
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.tgdownloader.entity
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

# 日志配置
logging:
  level:
    root: INFO
    com.tgdownloader: INFO
  file:
    name: ./logs/tgdownloader.log

# JWT 配置
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-this-in-production-must-be-at-least-256-bits}
  expiration: ${JWT_EXPIRATION:86400000}
