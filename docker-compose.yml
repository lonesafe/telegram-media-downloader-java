services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tgdownloader
    restart: unless-stopped
    ports:
      - "1580:80"     # Nginx（前端 + API 代理）
      - "1506:3306"   # MySQL（可选，仅宿主机调试用）
    volumes:
      # 下载文件持久化
      - ./data/downloads:/app/downloads
      # MySQL 数据持久化
      - ./data/mysql:/var/lib/mysql
      # 日志持久化
      - ./data/logs:/data/logs
      # TDLib 会话（登录状态）
      - ./data/tdlib_db:/app/tdlib_db
      - ./data/tdlib_db_bot:/app/tdlib_db_bot
      # 临时文件
      - ./data/temp:/app/temp
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

networks:
  trim-default:
    external: true

